<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edelweiss Café – Menu</title>
<style>
body { font-family: Arial; background:#0f0f0f; color:#fff; margin:0; padding:0; }
header { text-align:center; padding:20px; }
h1 { color:#f4d47c; font-size:1.8em; margin:0; }
.section { padding:15px; border-bottom:1px solid #333; }
.item { display:flex; align-items:center; padding:5px 0; flex-wrap:wrap; }
.price { color:#f4d47c; font-weight:bold; }
.tabs { display:flex; overflow-x:auto; padding:5px 0; margin:10px 0; scrollbar-width:none; -ms-overflow-style:none; }
.tabs::-webkit-scrollbar { display:none; }
.tabs button { flex:0 0 auto; background:#222; color:#fff; border:1px solid #444; padding:6px 10px; margin:0 3px; border-radius:6px; cursor:pointer; font-size:0.9em; white-space:nowrap; }
#logo { width:120px; max-width:30%; cursor:pointer; }
#langSelect { margin:10px; padding:5px; }

#adminModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#fff; padding:20px; overflow:auto; z-index:1000; }
#adminModal table { width:100%; border-collapse:collapse; margin-top:10px; }
#adminModal th, #adminModal td { border:1px solid #444; padding:6px; white-space:nowrap; }
#adminModal th { background:#222; color:#f4d47c; }
#closeAdmin { position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px; }
</style>
</head>
<body>

<header>
<img id="logo" src="logo.png" alt="Edelweiss Logo">
<h1>EDELWEISS CAFÉ</h1>
</header>

<select id="langSelect">
  <option value="GR">Ελληνικά</option>
  <option value="EN">English</option>
  <option value="FR">Français</option>
  <option value="DE">Deutsch</option>
  <option value="IT">Italiano</option>
  <option value="ES">Español</option>
  <option value="RU">Русский</option>
  <option value="RS">Српски</option>
  <option value="BG">Български</option>
  <option value="RO">Română</option>
  <option value="AL">Shqip</option>
  <option value="TR">Türkçe</option>
</select>

<div class="tabs">
<button onclick="showSection('coffee')">Καφέδες</button>
<button onclick="showSection('beverages')">Ροφήματα</button>
<button onclick="showSection('juices')">Χυμοί</button>
<button onclick="showSection('smoothies')">Smoothies</button>
<button onclick="showSection('softdrinks')">Αναψυκτικά</button>
<button onclick="showSection('sandwiches')">Σάντουιτς</button>
<button onclick="showSection('breakfast')">Πρωινά</button>
<button onclick="showSection('salads')">Σαλάτες</button>
<button onclick="showSection('fastfood')">Fast Food</button>
<button onclick="showSection('icecream')">Παγωτά</button>
</div>

<!-- Sections placeholders -->
<div class="section" id="coffee"></div>
<div class="section" id="beverages"></div>
<div class="section" id="juices"></div>
<div class="section" id="smoothies"></div>
<div class="section" id="softdrinks"></div>
<div class="section" id="sandwiches"></div>
<div class="section" id="breakfast"></div>
<div class="section" id="salads"></div>
<div class="section" id="fastfood"></div>
<div class="section" id="icecream"></div>

<!-- Admin modal HTML -->
<div id="adminModal">
  <span id="closeAdmin">&times;</span>
  <h2 style="text-align:center; color:#f4d47c;">Admin Menu</h2>
  <label>Επιλογή Ενότητας:</label>
  <select id="adminSectionSelect"></select>
  <label>Επιλογή Γλώσσας:</label>
  <select id="adminLangSelect">
    <option value="GR">Ελληνικά</option>
    <option value="EN">English</option>
    <option value="FR">Français</option>
    <option value="DE">Deutsch</option>
    <option value="IT">Italiano</option>
    <option value="ES">Español</option>
    <option value="RU">Русский</option>
    <option value="RS">Српски</option>
    <option value="BG">Български</option>
    <option value="RO">Română</option>
    <option value="AL">Shqip</option>
    <option value="TR">Türkçe</option>
  </select>

  <table id="adminTable">
    <thead>
      <tr>
        <th>Όνομα</th>
        <th>Τιμή</th>
        <th>Εικόνα</th>
        <th>Δράσεις</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <input id="newProdName" placeholder="Όνομα" style="margin:5px; padding:4px;">
  <input id="newProdPrice" placeholder="Τιμή" style="margin:5px; padding:4px;">
  <input id="newProdImg" placeholder="Όνομα αρχείου εικόνας" style="margin:5px; padding:4px;">
  <button id="addProdBtn" style="margin:5px; padding:4px;">Προσθήκη Προϊόντος</button>
</div>

<!-- Script -->
<script>
// Default menuData (παράδειγμα καφέδων)
const defaultMenuData = {
  coffee: {
    GR:[
      {name:"Ελληνικός", price:"2.50€", img:"images/A1.jpg"},
      {name:"Διπλός Ελληνικός", price:"3.50€", img:"images/A2.jpg"},
      {name:"Nes / Φραπέ", price:"3.00€", img:"images/A3.jpg"}
    ],
    EN:[
      {name:"Greek Coffee", price:"2.50€", img:"images/A1.jpg"},
      {name:"Double Greek Coffee", price:"3.50€", img:"images/A2.jpg"},
      {name:"Nes / Frappe", price:"3.00€", img:"images/A3.jpg"}
    ]
  }
};

const STORAGE_KEY = 'edelweissMenuData';
let savedData = localStorage.getItem(STORAGE_KEY);
let menuData = savedData ? JSON.parse(savedData) : JSON.parse(JSON.stringify(defaultMenuData));
function saveMenu(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(menuData)); }

let currentLanguage = 'GR';
document.getElementById('langSelect').addEventListener('change',()=>{ 
  currentLanguage = document.getElementById('langSelect').value; 
  showSection('coffee'); 
});

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  const sec = document.getElementById(id);
  let items = menuData[id];
  if(items[currentLanguage]) items = items[currentLanguage]; else items = [];

  // Cache-busting για εικόνες
  sec.innerHTML = items.map(item=>`
    <div class="item" style="display:flex; align-items:center; margin-bottom:5px;">
      ${item.img ? `<img src="${item.img}?v=${Date.now()}" style="width:50px; height:50px; object-fit:cover; margin-right:10px; border-radius:5px;">` : ''}
      <span style="flex:1;">${item.name}</span>
      <span class="price">${item.price}</span>
    </div>
  `).join('');

  sec.style.display='block';
}

// Αρχική εμφάνιση Καφέδες
showSection('coffee');

// Admin modal logic
let logoClicks=0;
const logo=document.getElementById('logo');
const adminModal=document.getElementById('adminModal');
const adminSectionSelect=document.getElementById('adminSectionSelect');
const adminLangSelect=document.getElementById('adminLangSelect');
const adminTableBody=document.querySelector('#adminTable tbody');
const addProdBtn=document.getElementById('addProdBtn');
const newProdName=document.getElementById('newProdName');
const newProdPrice=document.getElementById('newProdPrice');
const newProdImg=document.getElementById('newProdImg');
let currentAdminLang='GR';

logo.addEventListener('click',()=>{
  logoClicks++; 
  if(logoClicks>=5){
    logoClicks=0;
    const code=prompt("Εισάγετε τον κωδικό admin:");
    if(code==='1234'){ adminModal.style.display='block'; populateSectionSelect(); populateTable(); }
    else alert("Λανθασμένος κωδικός!");
  }
});
document.getElementById('closeAdmin').addEventListener('click',()=>{adminModal.style.display='none';});

function populateSectionSelect(){
  adminSectionSelect.innerHTML='';
  Object.keys(menuData).forEach(sec=>{
    const opt=document.createElement('option'); opt.value=sec; opt.text=sec.toUpperCase();
    adminSectionSelect.appendChild(opt);
  });
}

function populateTable(){
  const sec=adminSectionSelect.value;
  currentAdminLang=adminLangSelect.value;
  adminTableBody.innerHTML='';
  let items=menuData[sec];
  if(items[currentAdminLang]) items=items[currentAdminLang]; else items=[];
  items.forEach((item,i)=>{
    const row=document.createElement('tr');
    row.innerHTML=`<td contenteditable="true" oninput="updateItem('${sec}',${i},'name',this.innerText)">${item.name}</td>
                   <td contenteditable="true" oninput="updateItem('${sec}',${i},'price',this.innerText)">${item.price}</td>
                   <td contenteditable="true" oninput="updateItem('${sec}',${i},'img',this.innerText)">${item.img||''}</td>
                   <td><button onclick="deleteItem('${sec}',${i})">Διαγραφή</button></td>`;
    adminTableBody.appendChild(row);
  });
}

adminSectionSelect.addEventListener('change',populateTable);
adminLangSelect.addEventListener('change',populateTable);

window.updateItem=function(sec,i,key,value){
  menuData[sec][currentAdminLang][i][key]=value;
  if(key==='price'||key==='img'){
    Object.keys(menuData[sec]).forEach(lang=>{
      if(lang!==currentAdminLang) menuData[sec][lang][i][key]=value;
    });
  }
  saveMenu(); showSection(sec);
}

window.deleteItem=function(sec,i){
  Object.keys(menuData[sec]).forEach(lang=>menuData[sec][lang].splice(i,1));
  saveMenu(); populateTable(); showSection(sec);
}

addProdBtn.addEventListener('click',()=>{
  const sec=adminSectionSelect.value;
  const name=newProdName.value.trim();
  const price=newProdPrice.value.trim()||'—';
  const img=newProdImg.value.trim()||'';
  if(name===''){ alert("Γράψε όνομα προϊόντος"); return; }
  Object.keys(menuData[sec]).forEach(lang=>{
    menuData[sec][lang].push({name: lang===currentAdminLang?name:'', price, img});
  });
  saveMenu(); newProdName.value=''; newProdPrice.value=''; newProdImg.value='';
  populateTable(); showSection(sec);
});
</script>

</body>
</html>
